commands:
  radar:
    description: 查看气象图
    options:
      name: 图名
      count: 最大输出数量
      reverse: 反转顺序
      type: 输出类型
      type.img: 输出图片
      type.url: 输出 URL
      type.gif: 输出 GIF 动画
      fps: 帧率
      loop: 循环次数
    messages:
      unknown: '{0}：未知气象图名，可使用 radar.list 查看所有气象图。'
  radar.list:
    description: 查看图组内所有气象图
    messages:
      unknown: '{0}：未知图组名。'
