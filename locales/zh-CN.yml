commands:
  radar:
    description: 查看雷达图
    options:
      name: 雷达站名称
      count: 最大输出数量
      reverse: 反转顺序
      type: 输出类型
      type.img: 输出图片
      type.url: 输出 URL
      type.gif: 输出 GIF 动画
      fps: 帧率
      loop: 循环次数
    messages:
      unknown: '{0}：未知雷达站名称，可使用 radar.list 查看所有雷达站。'
  radar.list:
    description: 查看区域内所有雷达站
    messages:
      unknown: '{0}：未知区域。'
